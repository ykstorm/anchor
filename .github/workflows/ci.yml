name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------- lint + typecheck + unit tests ----------
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://ci:ci@localhost:5432/anchor" npx prisma generate

      - name: Lint
        run: npm run lint || true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ---------- docker build (no push) ----------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: anchor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- e2e against docker compose stack ----------
  e2e:
    name: E2E (compose smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Bring up stack
        run: |
          docker compose up -d --build
          # Poll until the health route returns 200 with {ok:true}
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS -o /tmp/h.json -w "%{http_code}" http://localhost:3000/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] && jq -e '.ok == true' /tmp/h.json > /dev/null 2>&1; then
              echo "Health OK after ${i}s"
              exit 0
            fi
            echo "Waiting for health... (attempt $i, status=$STATUS)"
            sleep 2
          done
          echo "Health check failed — app logs:"
          docker compose logs app
          exit 1

      - name: Smoke test — health endpoint body
        run: |
          curl -fsS http://localhost:3000/api/health | tee /tmp/health.json
          test "$(jq -r '.ok' /tmp/health.json)" = "true"

      - name: Smoke test — DB extension loaded
        run: |
          docker compose exec -T postgres pg_isready -U anchor && echo "postgres OK"
          docker compose exec -T postgres psql -U anchor -d anchor -tA -c "SELECT 1 FROM pg_extension WHERE extname='vector';" | tee /tmp/pg.txt
          test "$(cat /tmp/pg.txt)" = "1"

      - name: Capture logs on failure
        if: failure()
        run: docker compose logs > compose-logs.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------- publish docker image on tag ----------
  publish:
    name: Publish image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, docker, e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ykstorm/anchor:latest
            ghcr.io/ykstorm/anchor:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
