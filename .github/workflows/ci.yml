name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------- lint + typecheck + unit tests ----------
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://ci:ci@localhost:5432/anchor" npx prisma generate

      - name: Lint
        run: npm run lint || true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ---------- docker build (no push) ----------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: anchor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- e2e against docker compose stack ----------
  e2e:
    name: E2E (compose smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Bring up stack
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_CI }}
        run: |
          docker compose up -d --build
          ./scripts/wait-for-health.sh http://localhost:3000/api/health 60

      - name: Seed sample corpus
        run: |
          docker compose exec -T app npx prisma migrate deploy
          docker compose exec -T app npm run seed

      - name: Hit /api/chat with a known-good question
        run: |
          curl -fsS -X POST http://localhost:3000/api/chat \
            -H "Content-Type: application/json" \
            -d '{"q":"what is the cosine floor used for?"}' | tee /tmp/result.json
          test "$(jq -r '.chunks | length' /tmp/result.json)" -ge 1

      - name: Hit /api/chat with a known-bad question (below floor)
        run: |
          curl -fsS -X POST http://localhost:3000/api/chat \
            -H "Content-Type: application/json" \
            -d '{"q":"asfgaffdfvbcxhztrjki random gibberish 9182734"}' | tee /tmp/bad.json
          test "$(jq -r '.chunks | length' /tmp/bad.json)" = 0
          test "$(jq -r '.refused' /tmp/bad.json)" = "true"

      - name: Capture logs on failure
        if: failure()
        run: docker compose logs > compose-logs.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------- publish docker image on tag ----------
  publish:
    name: Publish image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, docker, e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ykstorm/anchor:latest
            ghcr.io/ykstorm/anchor:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
